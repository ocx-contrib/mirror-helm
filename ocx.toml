#:schema https://ocx.sh/schemas/project/v1.json
# OCX project toolchain for the mirror-helm sibling repo.
#
# `cli` + `mirror` are the OCX pipeline tools (same pins as the other
# mirror-* siblings). `uv` is added so `ocx-mirror pipeline plan` finds
# `uv` on PATH when invoking the PEP 723 generate.py script — Helm ships
# its binaries on the get.helm.sh CDN, not as GitHub release assets, so
# this is a url_index mirror with a generator.

[tools]
cli = "dev.ocx.sh/ocx/cli:0.4.0-dev"
mirror = "dev.ocx.sh/ocx/mirror:0.4.0-dev"
uv = "ocx.sh/uv:0"
